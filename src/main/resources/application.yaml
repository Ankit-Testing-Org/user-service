server: {port: 8083}
logging:
  level: {root: INFO}
spring:
  datasource: {url: 'jdbc:mysql://mysql-local:3306/code_review?createDatabaseIfNotExist=true',
    username: root, password: root, initialization-mode: always, driver-class-name: com.mysql.cj.jdbc.Driver}
  hikari: {connection-timeout: 30000, maximum-pool-size: 10, validation-timeout: 5000}
  jpa:
    show-sql: false
    hibernate: {ddl-auto: none, dialect: org.hibernate.dialect.MySQL8Dialect, format_sql: true,
      globally_quoted_identifiers: true}
  flyway: {enabled: true, baseline-on-migrate: true, locations: 'classpath:db/migration'}
  kafka: {bootstrap-servers: 'localhost:9092'}
hibernate: {ddl-auto: update}
properties:
  hibernate: {dialect: org.hibernate.dialect.MySQL8Dialect, format_sql: true, globally_quoted_identifiers: true}
  sql:
    init: {mode: always}